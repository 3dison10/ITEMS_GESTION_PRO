<form enctype="multipart/form-data" method="post">
    {% csrf_token %}
    <label for="edad">NIT:</label>
    <input type="number" name="edad" required>
    
    <label for="nombre_usuario">Nombre Edificio:</label>
    <input type="text" name="nombre_usuario" required>
  
    <label for="nombre">Direccion Edificio:</label>
    <input type="text" name="nombre" required>
  
    <label for="apellidos">Nombre de Propietario:</label>
    <input type="text" name="apellidos" required>
  
    <label for="email">Email:</label>
    <input type="email" name="email" required>
  
    <label for="roles">Rol:</label>
    <select name="roles" required>
      <option value="usuario">Propietario</option>
      <option value="admin">Administrador</option>
    </select>
  
    <input type="submit" value="Enviar Solicitud de Creacion">
  </form>
